name: Release

# Triggered by the cross-repo push from TapTap-Pay/api's release-sdks
# workflow. The api repo writes the SDK version into build.gradle.kts
# and pushes the bare numeric tag (e.g. "0.0.41") onto this repo;
# this workflow then builds and publishes rs.taptap:sdk:<tag> to
# GitHub Packages, and cuts a matching GitHub Release.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Build + publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build --no-daemon

      - name: Publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle publish --no-daemon

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
